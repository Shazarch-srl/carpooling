{% extends "base.html" %}
{% block title %}Find Your Perfect Ride | Radicar{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Find Your Perfect Ride</h1>
  <p class="page-subtitle">Connect with drivers going your way</p>
</div>

<div class="card glass-effect mb-5">
  <div class="card-body">
    <form method="get" class="row g-3 align-items-end">
      <div class="col-md-5">
        <label class="form-label fw-semibold">
          <i class="fas fa-map-marker-alt text-primary me-1"></i>From
        </label>
        <input type="text" name="origin" class="form-control" placeholder="Enter origin city" value="{{ request.GET.origin }}">
      </div>
      <div class="col-md-5">
        <label class="form-label fw-semibold">
          <i class="fas fa-map-marker-alt text-danger me-1"></i>To
        </label>
        <input type="text" name="destination" class="form-control" placeholder="Enter destination city" value="{{ request.GET.destination }}">
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100" type="submit">
          <i class="fas fa-search me-2"></i>Search
        </button>
      </div>
    </form>
  </div>
</div>

{% include "rides/_ride_cards.html" %}
{% endblock %}
