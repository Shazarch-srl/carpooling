{% extends "base.html" %}
{% block content %}
<h1>Find a Ride</h1>
<form method="get" class="row g-2 mb-4">
  <div class="col">
    <input type="text" name="origin" class="form-control" placeholder="Origin" value="{{ request.GET.origin }}">
  </div>
  <div class="col">
    <input type="text" name="destination" class="form-control" placeholder="Destination" value="{{ request.GET.destination }}">
  </div>
  <div class="col-auto">
    <button class="btn btn-primary" type="submit">Search</button>
  </div>
</form>
<table class="table">
  <tr><th>Driver</th><th>From</th><th>To</th><th>Departure</th><th>Seats</th><th></th></tr>
  {% for ride in rides %}
    <tr>
      <td>{{ ride.driver.first_name }}</td>
      <td>{{ ride.origin }}</td>
      <td>{{ ride.destination }}</td>
      <td>{{ ride.departure_time }}</td>
      <td>{{ ride.seats }}</td>
      <td><a class="btn btn-sm btn-outline-primary" href="{% url 'ride_detail' ride.pk %}">View</a></td>
    </tr>
  {% empty %}
    <tr><td colspan="6">No rides found.</td></tr>
  {% endfor %}
</table>
{% endblock %}
